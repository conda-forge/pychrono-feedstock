schema_version: 1

context:
  name: chrono
  version: 9.0.1
  build: 3
  sha256: 86da726ed3e3bacf682666b21d9c95dc87746b026dbafc722051a3202b822d39

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/projectchrono/chrono/archive/${{ version }}.tar.gz
  sha256: ${{ sha256 }}
  patches:
    - patches/osx_swig.patch
    - patches/eigen5_version.patch

build:
  number: ${{ build }}
  skip:
  - win

outputs:
  - package:
      name: chrono
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - cmake
        - ninja
        - swig >=4.2,<4.3
        - if: linux and not aarch64
          then: libgomp
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      host:
        - eigen
        - python
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      run:
        - eigen
        - if: osx
          then: llvm-openmp
      run_exports:
        - ${{ pin_subpackage('chrono', upper_bound='x.x' ) }}
    build:
      script:
        - if: win
          then: build_chrono.bat
          else: build_chrono.sh
    tests:
      - script:
        - if: win
          then: if not exist %PREFIX%\Library\lib\ChronoEngine.lib exit 1
          else: test -f ${PREFIX}/lib/libChronoEngine${SHLIB_EXT}

  - package:
      name: chrono-cascade
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - cmake
        - ninja
        - if: linux and not aarch64
          then: libgomp
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      host:
        - ${{ pin_subpackage('chrono', exact=True) }}
        - opencascade
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      run:
        - ${{ pin_subpackage('chrono', exact=True) }}
        - if: osx
          then: llvm-openmp
    build:
      script:
        - if: win
          then: build_cascade.bat
          else: build_cascade.sh
    tests:
      - script:
        - if: win
          then: test -f ${PREFIX}/lib/ChronoEngine_cascade${SHLIB_EXT}
          else: test -f ${PREFIX}/lib/libChronoEngine_cascade${SHLIB_EXT}

  - package:
      name: chrono-ros
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - cmake
        - ninja
        - if: linux and not aarch64
          then: libgomp
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      host:
        - ${{ pin_subpackage('chrono', exact=True) }}
        - ros-humble-rclcpp
        - ros-humble-std-msgs
        - ros-humble-sensor-msgs
        - ros-humble-nav-msgs
        - ros-humble-geometry-msgs
        - ros-humble-tf2
        - ros-humble-tf2-ros
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      run:
        - ${{ pin_subpackage('chrono', exact=True) }}
        - if: osx
          then: llvm-openmp
    build:
      script:
        - if: win
          then: build_ros.bat
          else: build_ros.sh
    tests:
      - script:
        - if: win
          then: test -f ${PREFIX}/lib/ChronoEngine_ros${SHLIB_EXT}
          else: test -f ${PREFIX}/lib/libChronoEngine_ros${SHLIB_EXT}

  - package:
      name: pychrono
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - cmake
        - ninja
        - swig >=4.2,<4.3
        - if: linux and not aarch64
          then: libgomp
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      host:
        - ${{ pin_subpackage('chrono', exact=True) }}
        - eigen
        - python
        - if: osx
          then: llvm-openmp
        - if: win
          then: m2-base
      run:
        - ${{ pin_subpackage('chrono', exact=True) }}
        - python
        - if: osx
          then: llvm-openmp
    tests:
      - python:
          imports:
            - pychrono
    build:
      script:
        - if: win
          then: build_pychrono.bat
          else: build_pychrono.sh

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: A physics engine for constrained multi-flexible-body dynamics
  homepage: https://github.com/projectchrono/chrono

extra:
  recipe-maintainers:
    - traversaro
    - oursland
    - davidbrochart
    - SylvainCorlay
    - wolfv
